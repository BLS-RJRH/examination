<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทดสอบความรู้ CPR & AED</title>
    <!-- ใช้ Tailwind CSS สำหรับหน้าตาพรีเมียมสีน้ำเงินเข้ม-ทองตามความชอบของคุณ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- จุดหลักของ Web App -->
    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl border-t-8 border-[#0f172a] p-6 md:p-8">
        
        <!-- ส่วนหัวข้อหลัก -->
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-[#0f172a]">แบบทดสอบหลักสูตร CPR & AED</h1>
            <p class="text-gray-500 mt-2 text-sm md:text-base">สุ่ม 10 ข้อ | เกณฑ์การผ่าน 70% (7 คะแนนขึ้นไป)</p>
        </div>

        <!-- 1. หน้ากรอกข้อมูลพนักงาน -->
        <form id="infoForm" class="space-y-4">
            <h2 class="text-lg font-semibold text-gray-700 border-b pb-2">ข้อมูลผู้เข้าสอบ</h2>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">รหัสพนักงาน *</label>
                <input type="text" id="employeeId" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-slate-500 outline-none">
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div class="col-span-1">
                    <label class="block text-sm font-medium text-gray-600 mb-1">คำนำหน้า *</label>
                    <select id="prefix" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-slate-500 outline-none">
                        <option value="นาย">นาย</option>
                        <option value="นาง">นาง</option>
                        <option value="นางสาว">นางสาว</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-600 mb-1">ชื่อ - นามสกุล *</label>
                    <input type="text" id="fullName" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-slate-500 outline-none">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">แผนก *</label>
                <input type="text" id="department" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-slate-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-[#0f172a] hover:bg-slate-800 text-white font-semibold py-3 rounded-lg transition duration-200 mt-4 shadow-md">
                เริ่มทำแบบทดสอบ
            </button>
        </form>

        <!-- 2. หน้าข้อสอบ (จะถูกเปิดใช้งานด้วย JS) -->
        <div id="quizForm" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-slate-100 p-3 rounded-lg text-sm text-slate-700 font-medium">
                <span id="progressText">ข้อที่ 1 จาก 10</span>
                <span id="timerText">สุ่มคำถามแล้ว</span>
            </div>
            
            <div id="questionContainer" class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <p id="questionText" class="text-lg font-semibold text-slate-800 mb-4"></p>
                <div id="optionsContainer" class="space-y-3">
                    <!-- ตัวเลือกวิทยุจะถูกเรนเดอร์ที่นี่ -->
                </div>
            </div>

            <button id="nextBtn" disabled class="w-full bg-[#d4af37] hover:bg-yellow-600 text-slate-900 font-bold py-3 rounded-lg transition duration-200 opacity-50 cursor-not-allowed">
                ถัดไป
            </button>
        </div>

        <!-- 3. หน้าแสดงผลลัพธ์และปุ่มส่งข้อมูล -->
        <div id="resultPage" class="hidden text-center space-y-6 py-6">
            <div id="resultIcon" class="text-6xl animate-bounce"></div>
            <h2 id="resultStatusText" class="text-2xl font-bold"></h2>
            <p id="resultScoreText" class="text-xl text-gray-600"></p>
            
            <div id="actionContainer" class="pt-4">
                <!-- ปุ่มรีเซ็ตหรือไอคอนผ่านจะแสดงตรงนี้ -->
            </div>
            
            <p id="savingText" class="text-sm text-blue-500 hidden animate-pulse">กำลังบันทึกคะแนนลงสู่ระบบสารสนเทศ...</p>
        </div>

    </div>

    <script>
        // ใส่ Web App URL ของคุณที่ได้มาจาก Google Apps Script ตรงนี้
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbymOHRy9O63lzzpl7gt7HwaBnEygW08_3b8XeFnzPqcMcDlC2A7Z2e_fv_mJbaFe8U1wQ/exec";

        // คลังข้อสอบเรื่อง CPR + AED (Adult) เต็มรูปแบบ 20 ข้อ
        const rawQuestions = [
            { q: "1. เมื่อพบผู้ป่วยล้มฟุบลงต่อหน้าในที่สาธารณะ ขั้นตอนแรกสุดที่สำคัญที่สุดคืออะไร?", a: ["ประเมินความปลอดภัยของสถานที่ (Scene Safety)", "เข้าไปเขย่าตัวเรียกทันที", "ทำการกดหน้าอกทันที", "ตรวจชีพจรที่คอ"], c: 0 },
            { q: "2. อัตราความเร็วในการกดหน้าอก (Chest Compression Rate) สำหรับผู้ใหญ่ตามมาตรฐานสากลคือข้อใด?", a: ["60 - 80 ครั้งต่อนาที", "80 - 100 ครั้งต่อนาที", "100 - 120 ครั้งต่อนาที", "120 - 140 ครั้งต่อนาที"], c: 2 },
            { q: "3. ความลึกในการกดหน้าอกที่เหมาะสมและได้ประสิทธิภาพดีที่สุดสำหรับผู้ใหญ่คือเท่าใด?", a: ["ลึกอย่างน้อย 1 นิ้ว", "ลึกอย่างน้อย 2 นิ้ว (5 ซม.) แต่ไม่เกิน 2.4 นิ้ว (6 ซม.)", "ลึกอย่างน้อย 3 นิ้ว", "กดให้ลึกที่สุดเท่าที่แรงผู้ช่วยจะมี"], c: 1 },
            { q: "4. อัตราส่วนการกดหน้าอกสลับกับการช่วยหายใจ (Compression-to-Ventilation Ratio) ในผู้ใหญ่คือเท่าใด?", a: ["15 : 2", "30 : 2", "30 : 5", "50 : 2"], c: 1 },
            { q: "5. หากคุณอยู่คนเดียวและไม่มีอุปกรณ์ช่วยหายใจ แต่พบผู้ป่วยหัวใจหยุดเต้น ควรปฏิบัติอย่างไร?", a: ["ไปเดินหาคนมาช่วยก่อน", "กดหน้าอกอย่างต่อเนื่องเพียงอย่างเดียว (Hands-Only CPR)", "นั่งรอรถพยาบาล 1669", "พยายามเป่าปากอย่างเดียว"], c: 1 },
            { q: "6. หลังจากที่เปิดสวิตช์เครื่อง AED ขึ้นมาแล้ว ขั้นตอนต่อไปที่ต้องทำทันทีคืออะไร?", a: ["กดปุ่มช็อกไฟฟ้าทันที", "รอทีมกู้ชีพมาถึง", "ติดแผ่นนำไฟฟ้า (AED Pads) เข้าที่หน้าอกผู้ป่วยตามรูป", "ฟังการวิเคราะห์จังหวะหัวใจ"], c: 2 },
            { q: "7. การติดแผ่นนำไฟฟ้า AED บนหน้าอกผู้ใหญ่ที่ถูกต้องคือตำแหน่งใด?", a: ["ใต้กระดูกไหปลาร้าขวา และบริเวณชายโครงด้านซ้ายใต้ราวนม", "ตรงกลางหน้าอกทั้งสองแผ่น", "หน้าอกด้านซ้ายทั้งสองแผ่น", "ติดที่แผ่นหลังทั้งสองแผ่น"], c: 0 },
            { q: "8. ในขณะที่เครื่อง AED กำลังส่งเสียงเตือนว่า 'กำลังวิเคราะห์จังหวะหัวใจ (Analyzing Rhythm)' ข้อใดปฏิบัติตามหลักความปลอดภัย?", a: ["กดหน้าอกต่อเพื่อไม่ให้ขาดตอน", "ถอยห่างและห้ามให้ผู้ใดสัมผัสตัวผู้ป่วยเด็ดขาด", "ช่วยหายใจผู้ป่วยอย่างรวดเร็ว", "เขย่าตัวผู้ป่วยแรงๆ"], c: 1 },
            { q: "9. สัญญาณเสียงเตือน 'Shock Advised' จากเครื่อง AED หมายความว่าอย่างไร?", a: ["เครื่องเสียให้ปิดทันที", "หัวใจเต้นปกติแล้ว", "ผู้ป่วยต้องการกระแสไฟฟ้าช็อกกระตุ้นหัวใจ ให้ทุกคนถอยห่างแล้วกดปุ่มช็อก", "ให้ผู้ช่วยเอามือแตะหน้าอกผู้ป่วย"], c: 2 },
            { q: "10. หลังจากเครื่อง AED ทำการช็อกไฟฟ้า (Deliver Shock) เสร็จสิ้นแล้ว ผู้ช่วยเหลือควรทำอย่างไรต่อไป?", a: ["นั่งพักดูอาการ 5 นาที", "ตรวจสอบชีพจรของผู้ป่วยก่อน", "เริ่มกดหน้าอก (CPR) ต่อทันทีตามคำแนะนำของเครื่อง", "แกะแผ่นนำไฟฟ้าออก"], c: 2 },
            { q: "11. การปล่อยให้หน้าอกคืนตัวจนสุด (Chest Recoil) หลังการกดแต่ละครั้ง มีความสำคัญอย่างไร?", a: ["ทำให้ผู้ช่วยเหลือไม่เหนื่อยมาก", "เพื่อให้เลือดไหลกลับเข้าสู่หัวใจได้เต็มที่ก่อนการกดครั้งต่อไป", "ช่วยลดอาการซี่โครงหัก", "ทำให้ปอดขยายตัวได้มากกว่าปกติ"], c: 1 },
            { q: "12. หากผู้ป่วยมีเหงื่อท่วมหน้าอก หรือตัวเปียกโชก ก่อนติดแผ่น AED ควรจัดการอย่างไร?", a: ["ติดทับลงไปได้ทันทีเพราะกระแสไฟแรงสูง", "เช็ดหน้าอกผู้ป่วยให้แห้งก่อนติดแผ่น", "ห้ามใช้เครื่อง AED เด็ดขาด ให้กดหน้าอกอย่างเดียว", "นำผ้าหนาๆ มารองใต้แผ่น"], c: 1 },
            { q: "13. การประเมินผู้ป่วยหมดสติว่า 'ไม่หายใจ' หรือ 'หายใจเฮือก' เพื่อเริ่มทำ CPR ควรใช้เวลานานเท่าใด?", a: ["ห้ามเกิน 5 วินาที", "ใช้วลาอย่างน้อย 5 วินาที แต่ไม่เกิน 10 วินาที", "รอจนแน่ใจประมาณ 30 วินาที", "1 นาทีเต็ม"], c: 1 },
            { q: "14. เมื่อโทรแจ้งสายด่วน 1669 ข้อมูลใดที่สำคัญที่สุดที่ประชาชนควรแจ้งเจ้าหน้าที่?", a: ["สถานที่เกิดเหตุที่ชัดเจน อาการของผู้ป่วย และบอกว่ากำลังทำ CPR", "ประวัติการศึกษาของผู้ป่วย", "ชื่อของโรงพยาบาลที่อยากไป", "ราคาของอุปกรณ์ที่ใช้"], c: 0 },
            { q: "15. ในกรณีใดที่คุณสามารถ 'หยุด' ปฏิบัติการ CPR ได้ชั่วคราวหรือถาวร?", a: ["ทำไปได้ 2 นาทีแล้วเหนื่อย", "เมื่อผู้ป่วยกลับมาเคลื่อนไหว หายใจได้ปกติ หรือมีทีมแพทย์กู้ชีพมารับช่วงต่ออย่างเป็นทางการ", "เมื่อคนมุงบอกให้หยุด", "เมื่อผ่านไปเกิน 5 นาทีแล้วอาการไม่ดีขึ้น"], c: 1 },
            { q: "16. ท่าทางการวางมือในการกดหน้าอกผู้ใหญ่ที่ถูกต้องคือตำแหน่งใด?", a: ["บริเวณลิ้นปี่พอดี", "ครึ่งล่างของกระดูกหน้าอก (บริเวณกึ่งกลางระหว่างราวนมทั้งสองข้าง)", "บริเวณหน้าอกข้างซ้ายตรงหัวใจ", "ใต้ซี่โครงขวา"], c: 1 },
            { q: "17. การจัดท่าทางของผู้ช่วยในขณะกดหน้าอกที่ถูกต้องและช่วยผ่อนแรงคือข้อใด?", a: ["นั่งคุกเข่าข้างผู้ป่วย แขนเหยียดตรงทั้งสองข้างตั้งฉากกับหน้าอกผู้ป่วย ใช้แรงจากสะโพกทิ้งน้ำหนักลงไป", "งอข้อศอกเล็กน้อยเพื่อความยืดหยุ่น", "นั่งเก้าอี้ข้างเตียงแล้วก้มลงกด", "ยืนโน้มตัวลงมา"], c: 0 },
            { q: "18. ข้อใดคือข้อห้ามที่สำคัญในการใช้เครื่อง AED ในที่สาธารณะ?", a: ["ห้ามใช้ในที่ๆ มีฝนตกหนักหรือลอยคออยู่ในน้ำท่วม", "ห้ามใช้กับคนที่มีอายุมากกว่า 60 ปี", "ห้ามใช้ในอาคารปิดที่มีเครื่องปรับอากาศ", "ห้ามใช้เกิน 2 ครั้งต่อคน"], c: 0 },
            { q: "19. หากเครื่อง AED แจ้งเตือนว่า 'No Shock Advised' (ไม่แนะนำให้ช็อก) หมายความว่าอย่างไร?", a: ["ผู้ป่วยเสียชีวิตแน่นอนแล้ว ให้เลิกทำ", "จังหวะหัวใจผู้ป่วยไม่จำเป็นต้องใช้ไฟฟ้าช็อก ให้ผู้ช่วยรีบทำ CPR ต่อทันทีตามรอบ", "เครื่องเสีย", "ให้รอแพทย์มาถึงโดยห้ามแตะต้องตัว"], c: 1 },
            { q: "20. หากผู้ป่วยติดแผ่นยาแก้ปวดหรือแผ่นยาซึมซับผิวหนังตรงบริเวณที่ต้องติดแผ่น AED ควรทำอย่างไร?", a: ["ติดแผ่น AED ทับแผ่นยาไปเลย", "ลอกแผ่นยาออกและเช็ดทำความสะอาดผิวก่อนติดแผ่น AED", "เปลี่ยนไปติดแผ่น AED ที่หน้าท้องแทน", "ไม่ต้องใช้เครื่อง AED"], c: 1 }
        ];

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let userData = {};

        const infoForm = document.getElementById('infoForm');
        const quizForm = document.getElementById('quizForm');
        const resultPage = document.getElementById('resultPage');
        const questionContainer = document.getElementById('questionContainer');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const nextBtn = document.getElementById('nextBtn');
        const progressText = document.getElementById('progressText');

        // ฟังก์ชันสุ่มข้อสอบ 10 ข้อจากคลัง 20 ข้อ
        function getRandomQuestions(array, num) {
            const shuffled = [...array].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, num);
        }

        // เมื่อกดยืนยันหน้าข้อมูลพนักงาน
        infoForm.addEventListener('submit', function(e) {
            e.preventDefault();
            userData = {
                employeeId: document.getElementById('employeeId').value,
                prefix: document.getElementById('prefix').value,
                fullName: document.getElementById('fullName').value,
                department: document.getElementById('department').value
            };
            
            // สุ่มข้อสอบเตรียมไว้ 10 ข้อ
            currentQuestions = getRandomQuestions(rawQuestions, 10);
            currentQuestionIndex = 0;
            score = 0;

            infoForm.classList.add('hidden');
            quizForm.classList.remove('hidden');
            showQuestion();
        });

        // แสดงผลคำถามและคำตอบทีละข้อ
        function showQuestion() {
            nextBtn.disabled = true;
            nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
            optionsContainer.innerHTML = '';
            
            progressText.innerText = `ข้อที่ ${currentQuestionIndex + 1} จาก 10`;
            const qData = currentQuestions[currentQuestionIndex];
            questionText.innerText = qData.q;

            qData.a.forEach((option, index) => {
                const label = document.createElement('label');
                label.className = "flex items-center p-3 border rounded-lg cursor-pointer bg-white hover:bg-slate-50 transition duration-150 border-slate-200 block";
                label.innerHTML = `
                    <input type="radio" name="answer" value="${index}" class="h-4 w-4 text-slate-900 border-gray-300 focus:ring-slate-500">
                    <span class="ml-3 text-slate-700 font-medium">${getChoiceLetter(index)}. ${option}</span>
                `;
                label.querySelector('input').addEventListener('change', () => {
                    // ปลดล็อกปุ่มถัดไปเมื่อมีการเลือกคำตอบ
                    nextBtn.disabled = false;
                    nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    
                    // เพิ่มคลาสไฮไลต์ข้อที่เลือก
                    document.querySelectorAll('#optionsContainer label').forEach(l => l.classList.remove('border-slate-800', 'bg-slate-50'));
                    label.classList.add('border-slate-800', 'bg-slate-50');
                });
                optionsContainer.appendChild(label);
            });
        }

        function getChoiceLetter(index) {
            return ['ก', 'ข', 'ค', 'ง'][index];
        }

        // เมื่อกดปุ่มถัดไป
        nextBtn.addEventListener('click', () => {
            const selectedOption = document.querySelector('input[name="answer"]:checked');
            if (!selectedOption) return;

            const selectedAnswer = parseInt(selectedOption.value);
            if (selectedAnswer === currentQuestions[currentQuestionIndex].c) {
                score++;
            }

            currentQuestionIndex++;
            if (currentQuestionIndex < 10) {
                showQuestion();
            } else {
                endQuiz();
            }
        });

        // จบการทำข้อสอบ คำนวณผลลัพธ์ และส่งไป Google Sheet
        function endQuiz() {
            quizForm.classList.add('hidden');
            resultPage.classList.remove('hidden');
            
            const passCriteria = 7; // 70% จาก 10 ข้อ คือ 7 คะแนน
            const isPassed = score >= passCriteria;
            const statusStr = isPassed ? "ผ่าน" : "ไม่ผ่าน";

            document.getElementById('resultScoreText').innerText = `คุณทำคะแนนได้ ${score} / 10 คะแนน`;
            
            const iconDiv = document.getElementById('resultIcon');
            const statusText = document.getElementById('resultStatusText');
            const actionContainer = document.getElementById('actionContainer');

            if (isPassed) {
                iconDiv.innerText = "🎉";
                statusText.innerText = "ยินดีด้วยคุณผ่านการทดสอบแล้ว!";
                statusText.className = "text-2xl font-bold text-green-600";
                actionContainer.innerHTML = `<p class="text-gray-500 font-medium">บันทึกข้อมูลผลการสอบเข้าสู่ระบบเรียบร้อยแล้ว</p>`;
            } else {
                iconDiv.innerText = "❌";
                statusText.innerText = "คุณยังไม่ผ่านการทดสอบตามเกณฑ์";
                statusText.className = "text-2xl font-bold text-red-600";
                actionContainer.innerHTML = `
                    <button onclick="location.reload()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-6 rounded-lg transition duration-200 shadow">
                        กลับไปสอบใหม่
                    </button>
                `;
            }

            // แสดงคำว่ากำลังบันทึกข้อมูล
            const savingText = document.getElementById('savingText');
            savingText.classList.remove('hidden');

            // ส่ง Payload ไปยัง Google Apps Script API เพื่อเก็บข้อมูลลง Sheet
            const payload = {
                ...userData,
                score: score,
                status: statusStr
            };

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // รองรับการทำ Request แบบไม่ต้องติดเงื่อนไข CORS ของ Google
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                savingText.innerText = "✓ บันทึกข้อมูลลง Google Sheet สำเร็จ";
                savingText.className = "text-sm text-green-500 font-medium";
            })
            .catch((err) => {
                console.error("Error saving data:", err);
                savingText.innerText = "⚠️ ไม่สามารถเชื่อมต่อกับฐานข้อมูลชีตได้ในขณะนี้";
                savingText.className = "text-sm text-amber-600 font-medium";
            });
        }
    </script>
</body>
</html>
